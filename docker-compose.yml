services:
  # ── PostgreSQL + pgvector (local DB; added fully in Step 2) ───────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oiagent}
      POSTGRES_USER: ${POSTGRES_USER:-oiagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oiagent}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oiagent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend (entry point added in Step 3) ─────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oiagent}:${POSTGRES_PASSWORD:-oiagent}@db:5432/${POSTGRES_DB:-oiagent}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/api
          target: /app

  # ── Next.js frontend ──────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: deps        # Use deps stage for dev (hot-reload via volume)
    restart: unless-stopped
    command: npm run dev
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  db_data:
