name: CI — Static Analysis

on:
  push:
  pull_request:

jobs:
  # ── Python (Ruff + mypy) ──────────────────────────────────────────────────
  lint-api:
    name: Python static analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
          activate-environment: true
          working-directory: apps/api

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # Opt-in: enable once type annotations are in place
      # - name: mypy
      #   run: uv run mypy .

  # ── Python tests (pytest + local pgvector DB) ─────────────────────────────
  test-api:
    name: Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: oiagent
          POSTGRES_USER: oiagent
          POSTGRES_PASSWORD: oiagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oiagent -d oiagent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Use 127.0.0.1 so the client does not prefer IPv6 (::1) while the service
      # port mapping is IPv4-only on some runners.
      DATABASE_URL: postgresql://oiagent:oiagent@127.0.0.1:5432/oiagent

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
          activate-environment: true
          working-directory: apps/api

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Apply database migrations
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r f; do
            echo "Applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done < <(find ../../db/migrations -maxdepth 1 -type f -name '*.sql' | LC_ALL=C sort)

      - name: Pytest
        run: uv run pytest -q

  # ── Frontend (ESLint + TypeScript) ───────────────────────────────────────
  lint-web:
    name: Frontend static analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit
